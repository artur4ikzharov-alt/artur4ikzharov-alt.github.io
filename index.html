<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATR GOLD TERMINAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Панель с монетами скроллится горизонтально, если их много */
        .top-bar { 
            height: 50px; background: #131722; display: flex; align-items: center; 
            padding: 0 10px; border-bottom: 1px solid #2a2e39; gap: 8px;
            overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
        }
        .top-bar::-webkit-scrollbar { display: none; }

        .coin-btn {
            background: #2a2e39; color: #d1d4dc; border: none; padding: 6px 12px;
            border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold;
            flex-shrink: 0;
        }
        .coin-btn:active { background: #363c4e; }
        .active-btn { border: 1px solid #f0b90b; color: #f0b90b; background: rgba(240, 185, 11, 0.1); }

        .strategy-badge { 
            position: fixed; top: 55px; right: 10px; z-index: 10;
            font-size: 9px; background: rgba(0, 0, 0, 0.7); color: #f0b90b; 
            border: 1px solid #f0b90b; padding: 2px 6px; border-radius: 3px; 
        }

        #tv-chart-container { height: calc(100% - 50px); width: 100%; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="coin-btn active-btn" onclick="changeSymbol('BINANCE:ORDIUSDT', this)">ORDI</button>
    <button class="coin-btn" onclick="changeSymbol('BINANCE:DOTUSDT', this)">DOT</button>
    <button class="coin-btn" onclick="changeSymbol('BINANCE:ZECUSDT', this)">ZEC</button>
    <button class="coin-btn" onclick="changeSymbol('BINANCE:AXSUSDT', this)">AXS</button>
    <button class="coin-btn" onclick="changeSymbol('BINANCE:SOLUSDT', this)">SOL</button>
    <button class="coin-btn" onclick="changeSymbol('BINANCE:BTCUSDT', this)">BTC</button>
    <button class="coin-btn" onclick="changeSymbol('BINANCE:ETHUSDT', this)">ETH</button>
    <button class="coin-btn" onclick="changeSymbol('BINANCE:NEARUSDT', this)">NEAR</button>
</div>

<div class="strategy-badge">ATR 2 / KEY 1</div>

<div id="tv-chart-container">
    <div id="tradingview_logic" style="height:100%;width:100%"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script type="text/javascript">
  let widget;

  function loadChart(symbol) {
    widget = new TradingView.widget({
      "autosize": true,
      "symbol": symbol,
      "interval": "15",
      "timezone": "Etc/UTC",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "enable_publishing": false,
      "hide_top_toolbar": false,
      "container_id": "tradingview_logic",
      "backgroundColor": "#000000",
      "gridColor": "rgba(42, 46, 57, 0.06)",
      "studies": ["ATR@tv-basicstudies"]
    });
  }

  function changeSymbol(symbol, el) {
    document.querySelectorAll('.coin-btn').forEach(btn => btn.classList.remove('active-btn'));
    el.classList.add('active-btn');
    loadChart(symbol);
  }

  // Запуск с твоей первой монеты
  loadChart('BINANCE:ORDIUSDT');
</script>

</body>
</html>
