<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO TERMINAL | ATR 2 KEY 1</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        .top-bar { 
            height: 40px; 
            background: #131722; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            border-bottom: 1px solid #2a2e39; 
            justify-content: space-between; 
            box-sizing: border-box;
        }

        .symbol-info { display: flex; align-items: center; gap: 8px; font-weight: 600; color: #d1d4dc; font-size: 14px; }
        .badge { font-size: 9px; background: rgba(240, 185, 11, 0.15); color: #f0b90b; border: 1px solid #f0b90b; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; }

        #tv-chart-container { height: calc(100% - 40px); width: 100%; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="symbol-info">
        BTC/USDT <span class="badge">ATR 2 / KEY 1</span>
    </div>
    <div style="font-size: 10px; color: #5d606b;">CORE ENGINE v3.0</div>
</div>

<div id="tv-chart-container">
    <div class="tradingview-widget-container" style="height:100%;width:100%">
      <div id="tradingview_logic" style="height:100%;width:100%"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
      <script type="text/javascript">
      new TradingView.widget(
      {
      "autosize": true,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "15",
      "timezone": "Etc/UTC",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "toolbar_bg": "#f1f3f6",
      "enable_publishing": false,
      "hide_top_toolbar": false,
      "hide_legend": false,
      "save_image": false,
      "container_id": "tradingview_logic",
      "backgroundColor": "#000000",
      "gridColor": "rgba(42, 46, 57, 0.06)",
      "studies": [
        "ATR@tv-basicstudies"
      ]
    });
      </script>
    </div>
    </div>

</body>
</html>
