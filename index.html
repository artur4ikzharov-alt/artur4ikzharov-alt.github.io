<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO TERMINAL | ATR 2 KEY 1</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; background: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; overflow: hidden; }
        .top-bar { height: 45px; background: #181a20; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #2b3139; justify-content: space-between; }
        .symbol { font-weight: bold; color: #f0b90b; display: flex; align-items: center; gap: 10px; }
        .settings-badge { font-size: 10px; background: rgba(240, 185, 11, 0.1); color: #f0b90b; padding: 2px 8px; border-radius: 4px; border: 1px solid #f0b90b; }
        #chart { width: 100vw; height: calc(100vh - 45px); }
        .price-label { font-family: monospace; font-size: 16px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="symbol">
        BTC/USDT 
        <span class="settings-badge">GOLDEN: ATR 2 / KEY 1</span>
    </div>
    <div class="price-label" id="lastPrice">Connecting...</div>
</div>

<div id="chart"></div>

<script>
    // 1. Создаем график
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout: { background: { color: '#0b0e11' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1f222d' }, horzLines: { color: '#1f222d' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: '#2b3139' },
        timeScale: { borderColor: '#2b3139', timeVisible: true, secondsVisible: false },
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#2ebd85', downColor: '#f6465d', borderVisible: false,
        wickUpColor: '#2ebd85', wickDownColor: '#f6465d',
    });

    // 2. Получаем данные с Binance (последние 100 свечей 15м)
    fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=15m&limit=100')
        .then(res => res.json())
        .then(data => {
            const formattedData = data.map(d => ({
                time: d[0] / 1000,
                open: parseFloat(d[1]),
                high: parseFloat(d[2]),
                low: parseFloat(d[3]),
                close: parseFloat(d[4]),
            }));
            candleSeries.setData(formattedData);
        });

    // 3. Обновление цены в реальном времени через WebSocket
    const binanceSocket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_15m');
    binanceSocket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        const k = msg.k;
        const lastPrice = parseFloat(k.c).toFixed(2);
        document.getElementById('lastPrice').innerText = `$ ${lastPrice}`;
        document.getElementById('lastPrice').style.color = k.x ? '#2ebd85' : '#eaecef';

        candleSeries.update({
            time: k.t / 1000,
            open: parseFloat(k.o),
            high: parseFloat(k.h),
            low: parseFloat(k.l),
            close: parseFloat(k.c),
        });
    };
</script>
</body>
</html>
